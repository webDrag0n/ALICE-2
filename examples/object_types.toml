# Oikos · 物体类型目录(编号模板) —— 加新物体只往这里追加, 内核零改动
# 配套文档: ../world.md Part IV(类型/实例两层) / Part VII(Affordance) / W11
#
# 铁律:
#   - type_id 全局唯一、只增不复用; 退役标 deprecated=true 保号位, 不删不改。
#   - 号段: 1000家具 2000家电 3000固定设施 4000设备 5000可携带物 6000生物 9000+扩展。
#   - 能力(affordance)挂在类型上 —— 加物体顺带带来的交互在此一并声明。
#   - reach 是交互半径(米): 身体中心走进此半径即可交互(连续判定);
#     footprint 是连续占地半径; blocks_walk 决定是否为碰撞障碍。

# ───────────────────────── 1000 · 家具 furniture ─────────────────────────
[[type]]
type_id = 1001
name = "bed"
kind = "furniture"
blocks_walk = true
reach = 0.9                          # 交互半径(米): 身体走进此半径即可交互
interact_posture = ["standing"]
state_schema = { occupied = false }
affordances = [
  { capability = "lie_down", when = {} },
  { capability = "sleep",    when = { posture = ["lying"] } },
]
tags = ["bedroom", "rest"]

[[type]]
type_id = 1002
