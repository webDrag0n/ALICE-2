# ───────────────────────── 4000 · 设备 device(接外部桥) ─────────────────────────
# 设备背后是真实外部世界(MC/Telegram), 仅在具身门控满足时活跃(world.md W5)。
[[type]]
type_id = 4001
name = "computer"
kind = "device"
blocks_walk = true
reach = 0.9                          # 交互半径(米): 身体走进此半径即可交互
interact_posture = ["seated"]
state_schema = { power = "off" }
affordances = [
  { capability = "power_on_computer",  when = { posture = ["seated"] } },
  { capability = "login_minecraft",    when = { posture = ["seated"], object_state = { power = "on" } } },
  { capability = "play_minecraft",      when = { posture = ["seated"], object_state = { mc_session = "active" } } },
]
tags = ["desk", "device", "leisure"]

[[type]]
type_id = 4002
name = "phone"
kind = "device"
blocks_walk = false           # 便携小物, 不挡路
portable = true
reach = 0.9                          # 交互半径(米): 身体走进此半径即可交互
state_schema = { power = "on", battery = 1.0, unread = 0 }
affordances = [
  # 在充电处(脚下/相邻)可拿起
  { capability = "pick_up_phone", when = {} },
  # 下面的都要求"手里拿着本机"(具身认知: 我在用一部手机)
  { capability = "open_app",      when = { held = ["self"] } },
  { capability = "type_message",  when = { held = ["self"] } },
  { capability = "send_message",  when = { held = ["self"] } },
  { capability = "put_phone_on_charger", when = { held = ["self"] } },
]
tags = ["device", "social", "portable"]

# ───────────────────────── 5000 · 可携带物 item ─────────────────────────
[[type]]
type_id = 5003
name = "food_item"
kind = "item"
blocks_walk = false
portable = true
reach = 0.9                          # 交互半径(米): 身体走进此半径即可交互
state_schema = { fresh = true }
affordances = [
  { capability = "pick_up",  when = {} },
  { capability = "eat",      when = { held = ["self"] } },
]
tags = ["item", "food"]

# 想继续扩展? 往对应号段追加 [[type]] 即可:
#   1006 chair_office / 2005 dishwasher / 5001 cup / 6001 cat(宠物) / 9001 printer ...
# 每加一种, 内核、协议、已有物体都不用动 —— 这就是编号目录的意义。


